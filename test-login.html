<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test Login Supabase</title>
</head>
<body>
<h2>Test de conexión Supabase</h2>
<div id="status">Cargando...</div>
<br>
<input type="email" id="email" value="alesouto4.8@gmail.com" style="padding:8px;width:300px">
<br><br>
<input type="password" id="pass" value="Pinamar2026!" style="padding:8px;width:300px">
<br><br>
<button onclick="testLogin()" style="padding:10px 20px;background:green;color:white;border:none;cursor:pointer">Test Login</button>
<div id="result" style="margin-top:20px;font-family:monospace;white-space:pre"></div>

<script src="supabase-client.js"></script>
  <script src="supabase.js"></script>
<script>
const SUPABASE_URL      = 'https://lyugffmltlvqirmmzhar.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_xeY8RDN-wYnxFHhEpGoeOw_qgZ8c3C_';

document.getElementById('status').innerHTML = 
  'window.supabase: ' + (typeof window.supabase) + '<br>' +
  'createClient: ' + (typeof window.supabase?.createClient);

let db;
try {
  const { createClient } = window.supabase;
  db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  document.getElementById('status').innerHTML += '<br>✅ Cliente Supabase creado';
} catch(e) {
  document.getElementById('status').innerHTML += '<br>❌ Error: ' + e.message;
}

async function testLogin() {
  const email = document.getElementById('email').value;
  const pass  = document.getElementById('pass').value;
  const res   = document.getElementById('result');
  res.textContent = 'Intentando login...';
  try {
    const { data, error } = await db.auth.signInWithPassword({ email, password: pass });
    if (error) {
      res.textContent = '❌ ERROR:\n' + JSON.stringify(error, null, 2);
    } else {
      res.textContent = '✅ LOGIN EXITOSO:\n' + JSON.stringify({ 
        user_id: data.user?.id,
        email: data.user?.email,
        role: data.user?.role
      }, null, 2);
    }
  } catch(e) {
    res.textContent = '❌ EXCEPCIÓN: ' + e.message;
  }
}
</script>
</body>
</html>
