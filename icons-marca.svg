<!--
  Pinamar Propiedades — Set de iconos de marca
  ================================================
  Iconos de línea propios, dibujados en el lenguaje visual del isologotipo
  (pino + ola + duna + sol). NO son emoji de sistema operativo.

  Estilo: trazo 1.7px, redondeado, sin relleno salvo el "punto de firma"
  en el color ocre (#D69B2D) que aparece en cada icono, el mismo acento del sol
  del isologotipo, para que toda la familia se sienta parte de una marca.
  Color de trazo: currentColor (hereda el color de texto del elemento
  padre, normalmente el verde de marca o blanco sobre fondo oscuro).

  Uso:
    <svg class="icono" width="28" height="28"><use href="/icons-marca.svg#icono-candado"/></svg>

  Con CSS:
    .icono { stroke: verde de marca; }
    .icono-punto { fill: ocre de marca; }        (ya viene aplicado adentro de cada symbol)

  No usar como <img src="icons-marca.svg">: los sprites SVG con <use> necesitan
  cargarse inline en el DOM o vía fetch, porque <img> no ejecuta <use> entre
  archivos por seguridad en algunos navegadores. Ver guia-iconos.html para el
  snippet de carga recomendado.
-->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">

  <!-- ═══════════════════════════════════════════════
       ICONO-CANDADO — Garantía / Seguridad
       ═══════════════════════════════════════════════ -->
  <symbol id="icono-candado" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <rect x="5" y="11" width="14" height="10" rx="2"/>
    <path d="M8 11V7.5a4 4 0 0 1 8 0V11"/>
    <circle cx="12" cy="16" r="1.6" fill="currentColor" stroke="none"/>
    <circle cx="17.5" cy="7.5" r="1.4" class="icono-punto" fill="#D69B2D" stroke="none"/>
  </symbol>

  <!-- ═══════════════════════════════════════════════
       ICONO-FICHA — Ficha técnica certificada
       ═══════════════════════════════════════════════ -->
  <symbol id="icono-ficha" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M7 4.5h7l3 3V19a1.5 1.5 0 0 1-1.5 1.5h-8.5A1.5 1.5 0 0 1 5.5 19V6A1.5 1.5 0 0 1 7 4.5Z"/>
    <path d="M14 4.5v3h3"/>
    <path d="M8.5 12.5l1.8 1.8L14.5 10.5"/>
    <path d="M8.5 16.5h5"/>
    <circle cx="18" cy="18" r="1.4" fill="#D69B2D" stroke="none"/>
  </symbol>

  <!-- ═══════════════════════════════════════════════
       ICONO-CATASTRO — Mapa / Consulta catastral
       ═══════════════════════════════════════════════ -->
  <symbol id="icono-catastro" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M9 4.8 4.5 6.5v13L9 17.7l6 2.3 4.5-1.7v-13L15 7.3l-6-2.5Z"/>
    <path d="M9 4.8v12.9"/>
    <path d="M15 7.3v12.7"/>
    <circle cx="11.3" cy="11.5" r="1.5" fill="#D69B2D" stroke="none"/>
  </symbol>

  <!-- ═══════════════════════════════════════════════
       ICONO-LEGAL — Balanza / Asesoramiento legal
       ═══════════════════════════════════════════════ -->
  <symbol id="icono-legal" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 3.5v15.7"/>
    <path d="M6 6.5h12"/>
    <path d="M6 6.5 3.3 11.8a2.9 2.9 0 0 0 5.4 0L6 6.5Z"/>
    <path d="M18 6.5l-2.7 5.3a2.9 2.9 0 0 0 5.4 0L18 6.5Z"/>
    <path d="M8.5 20h7"/>
    <circle cx="12" cy="4.6" r="1.3" fill="#D69B2D" stroke="none"/>
  </symbol>

  <!-- ═══════════════════════════════════════════════
       ICONO-CONSTRUCCION — Grúa / Costo de construcción
       ═══════════════════════════════════════════════ -->
  <symbol id="icono-construccion" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 20.5V9"/>
    <path d="M5 9 18 5.5"/>
    <path d="M13 6.7v4.3"/>
    <path d="M13 7 19.5 9.2 15.5 11 13 9.5"/>
    <path d="M15.5 11v9.5"/>
    <path d="M3 20.5h14"/>
    <circle cx="18.6" cy="7" r="1.3" fill="#D69B2D" stroke="none"/>
  </symbol>

  <!-- ═══════════════════════════════════════════════
       ICONO-BUSCAR — Lupa / Sin resultados
       ═══════════════════════════════════════════════ -->
  <symbol id="icono-buscar" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="10.5" cy="10.5" r="6"/>
    <path d="M15 15l5 5"/>
    <circle cx="10.5" cy="10.5" r="1.4" fill="#D69B2D" stroke="none"/>
  </symbol>

  <!-- ═══════════════════════════════════════════════
       ICONO-COMPARAR — Casas ↔ Comparador (estado vacío)
       ═══════════════════════════════════════════════ -->
  <symbol id="icono-comparar" viewBox="0 0 32 22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M1.5 12.5 6 8.5l4.5 4"/>
    <path d="M2.8 12v6.5h6.4V12"/>
    <path d="M13 11.5h6"/>
    <path d="M13 11.5l2.2-2.2M13 11.5l2.2 2.2"/>
    <path d="M19 11.5l-2.2-2.2M19 11.5l-2.2 2.2"/>
    <path d="M21.5 12.5 26 8.5l4.5 4"/>
    <path d="M22.8 12v6.5h6.4V12"/>
    <circle cx="16" cy="4.5" r="1.3" fill="#D69B2D" stroke="none"/>
  </symbol>

  <!-- ═══════════════════════════════════════════════
       ICONO-INVERTIR — Tendencia ascendente
       ═══════════════════════════════════════════════ -->
  <symbol id="icono-invertir" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3.5 18 9 12l4 3 7.5-8.5"/>
    <path d="M15.5 6h5v5"/>
    <circle cx="9" cy="12" r="1.3" fill="#D69B2D" stroke="none"/>
  </symbol>

  <!-- ═══════════════════════════════════════════════
       ICONO-REFUGIO — Casa / Mi Refugio (vivienda principal)
       ═══════════════════════════════════════════════ -->
  <symbol id="icono-refugio" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 11.5 12 4l8 7.5"/>
    <path d="M6 10v9.5h12V10"/>
    <path d="M10 19.5v-5.8a2 2 0 0 1 4 0v5.8"/>
    <circle cx="12" cy="4" r="1.3" fill="#D69B2D" stroke="none"/>
  </symbol>

  <!-- ═══════════════════════════════════════════════
       ICONO-TURISMO — Sombrilla de playa
       ═══════════════════════════════════════════════ -->
  <symbol id="icono-turismo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 3.5v17"/>
    <path d="M4 11c1-4 4.5-6.5 8-6.5S19 7 20 11Z"/>
    <path d="M4 11c1.5 1.4 3.2 1.4 4.7 0M8.7 11c1.5 1.4 3.1 1.4 4.6 0M13.3 11c1.5 1.4 3.2 1.4 4.7 0"/>
    <path d="M12 17.5c-1.6 0-2.8 1-2.8 3"/>
    <circle cx="12" cy="4.4" r="1.3" fill="#D69B2D" stroke="none"/>
  </symbol>

  <!-- ═══════════════════════════════════════════════
       ICONO-ALERTA — Advertencia / Error al cargar
       ═══════════════════════════════════════════════ -->
  <symbol id="icono-alerta" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 4 21 19.5H3Z"/>
    <path d="M12 10v4.2"/>
    <circle cx="12" cy="17.2" r="1" fill="currentColor" stroke="none"/>
    <circle cx="18" cy="6.5" r="1.2" fill="#D69B2D" stroke="none"/>
  </symbol>

</svg>
